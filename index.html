<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUIK — Transport Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Firebase CDN — no installation needed -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<!-- XLSX for file upload parsing -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B1120;--bg2:#111827;--bg3:#1E293B;--border:#1E2D45;
  --blue:#3B82F6;--blue-dim:#1D4ED8;--orange:#F97316;--green:#22C55E;
  --red:#EF4444;--purple:#A855F7;--text:#F1F5F9;--muted:#64748B;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;color:#fff}.logo span{color:var(--orange)}
.hmeta{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.ldot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
nav{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto}
.tab{padding:12px 15px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;letter-spacing:.4px;text-transform:uppercase}
.tab:hover{color:var(--text)}.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
main{padding:20px 24px;max-width:1500px;margin:0 auto}
.panel{display:none}.panel.active{display:block}
.section-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:0 0 12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
@media(max-width:1050px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:16px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi-card.blue::before{background:linear-gradient(90deg,var(--blue),#60A5FA)}
.kpi-card.orange::before{background:linear-gradient(90deg,var(--orange),#FCD34D)}
.kpi-card.green::before{background:linear-gradient(90deg,var(--green),#86EFAC)}
.kpi-card.purple::before{background:linear-gradient(90deg,var(--purple),#C084FC)}
.kpi-card.red::before{background:linear-gradient(90deg,var(--red),#FCA5A5)}
.kpi-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.kpi-value{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:5px;font-family:'DM Mono',monospace}
.bgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
@media(max-width:900px){.bgrid{grid-template-columns:1fr}}
.bcard{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:16px}
.bc-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.bc-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700}
.bc-badge{padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700}
.bc-badge.own{background:#1D4ED820;color:#60A5FA;border:1px solid #1D4ED8}
.bc-badge.tpl{background:#7C3AED20;color:#C084FC;border:1px solid #7C3AED}
.bc-badge.adhoc{background:#EA580C20;color:#FCD34D;border:1px solid #EA580C}
.brow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:10px}
.brow:last-child{border-bottom:none}
.brow-l{color:var(--muted)}.brow-v{font-family:'DM Mono',monospace;font-size:11px}
.ubar{margin-top:8px}.ubar-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px}
.ubar-track{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.ubar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.twrap{background:var(--bg2);border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:20px}
.ttbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.ttitle{font-family:'Syne',sans-serif;font-size:13px;font-weight:700}
.tfiltrow{display:flex;gap:5px;flex-wrap:wrap}
.tfbtn{padding:4px 10px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text);transition:all .2s}
.tfbtn:hover,.tfbtn.act{border-color:var(--blue);color:var(--blue)}
table{width:100%;border-collapse:collapse}
thead th{padding:8px 10px;text-align:left;font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);background:var(--bg3);border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:hover{background:var(--bg3)}
tbody td{padding:7px 10px;font-family:'DM Mono',monospace;font-size:10px;vertical-align:middle}
.sbadge{padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;font-family:'Inter',sans-serif}
.s-Completed{background:#16A34A20;color:#4ADE80;border:1px solid #16A34A40}
.s-InTransit{background:#2563EB20;color:#60A5FA;border:1px solid #2563EB40}
.s-Delayed{background:#DC262620;color:#F87171;border:1px solid #DC262640}
.s-Partial{background:#D9770620;color:#FCD34D;border:1px solid #D9770640}
.wpill{padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600;font-family:'Inter',sans-serif}
.wh-own{background:#1D4ED820;color:#60A5FA}.wh-3pl{background:#7C3AED20;color:#C084FC}
.vt-Own{background:#16A34A20;color:#4ADE80}.vt-3PL{background:#7C3AED20;color:#C084FC}.vt-Adhoc{background:#EA580C20;color:#FCD34D}
.ttag{display:inline-block;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 5px;font-size:9px;font-family:'DM Mono',monospace}
.ttag.warn{border-color:#F9731660;color:#FCD34D;background:#F9731610}
.ttag.ok{border-color:#16A34A60;color:#4ADE80;background:#16A34A10}
.ttag.late{border-color:#DC262660;color:#F87171;background:#DC262610}
.delbtn{background:transparent;border:1px solid #DC262640;color:#F87171;border-radius:4px;padding:3px 7px;font-size:9px;font-weight:700;cursor:pointer;transition:all .2s}
.delbtn:hover{background:#DC262620;border-color:var(--red)}
.ecell{cursor:pointer;border-radius:3px;padding:2px 3px;transition:background .15s;display:inline-block}
.ecell:hover{background:var(--bg3);outline:1px dashed var(--border)}
.einput{background:var(--bg2);border:1px solid var(--blue);border-radius:4px;color:var(--text);font-family:'DM Mono',monospace;font-size:10px;padding:2px 5px;outline:none;width:82px}
.fsec{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:20px;margin-bottom:20px}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.flabel{display:block;font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.finput,.fselect{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-size:11px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.finput:focus,.fselect:focus{border-color:var(--blue)}
.fselect option{background:var(--bg2)}
.btn-p{padding:9px 20px;background:var(--blue);border:none;border-radius:7px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-p:hover{background:var(--blue-dim)}
.btn-s{padding:9px 18px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer}
.btn-s:hover{border-color:var(--muted);color:var(--text)}
.spwrap{position:relative;grid-column:1/-1}
.spinput{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-size:11px;font-family:'Inter',sans-serif;outline:none}
.spinput:focus{border-color:var(--blue)}
.spdrop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg2);border:1px solid var(--blue);border-radius:8px;max-height:180px;overflow-y:auto;z-index:60;display:none;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.spdrop.open{display:block}
.spopt{padding:7px 10px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:7px}
.spopt:hover,.spopt.hi{background:var(--bg3)}
.spopt.sel{color:var(--blue)}
.spchk{width:13px;height:13px;border-radius:3px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0}
.spopt.sel .spchk{background:var(--blue);border-color:var(--blue);color:#fff}
.sptags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.sptag{background:var(--blue-dim);color:#fff;border-radius:4px;padding:2px 7px;font-size:9px;font-weight:600;display:flex;align-items:center;gap:4px}
.sptag .rx{cursor:pointer;opacity:.7;font-size:11px}.sptag .rx:hover{opacity:1}
.scnt{background:var(--blue);color:#fff;border-radius:10px;font-size:9px;font-weight:700;padding:1px 6px;margin-left:5px}
.dinfo{margin-top:8px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:9px 11px;display:none}
.dinfo.show{display:block}
.dinfo-title{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--orange);margin-bottom:7px}
.drow{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);font-size:10px;flex-wrap:wrap}
.drow:last-child{border-bottom:none}
.dsn{font-family:'DM Mono',monospace;font-weight:600;width:138px;flex-shrink:0}
.dtime{font-family:'DM Mono',monospace;color:var(--orange)}
.dwin{font-family:'DM Mono',monospace;color:var(--muted);font-size:9px}
.ttogwrap{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:12px 14px;background:var(--bg3);border-radius:9px;border:1px solid var(--border)}
.ttog-lbl{font-size:12px;font-weight:600}.ttog-sub{font-size:9px;color:var(--muted);margin-top:2px}
.togswitch{position:relative;width:38px;height:21px;flex-shrink:0;margin-left:auto;cursor:pointer}
.togslider{position:absolute;inset:0;background:var(--border);border-radius:11px;transition:.3s}
.togslider::before{content:'';position:absolute;width:15px;height:15px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
.togswitch.on .togslider{background:var(--orange)}
.togswitch.on .togslider::before{transform:translateX(17px)}
.tdiv{border:none;border-top:2px dashed var(--border);margin:16px 0}
.tsect{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--orange);margin-bottom:10px}
.wh-filter{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.whbtn{padding:7px 14px;font-size:11px;font-weight:700;cursor:pointer;border:none;background:var(--bg3);color:var(--muted);transition:all .2s}
.whbtn:not(:last-child){border-right:1px solid var(--border)}
.whbtn.a-all{background:var(--blue);color:#fff}
.whbtn.a-own{background:#16A34A;color:#fff}
.whbtn.a-3pl{background:#7C3AED;color:#fff}
.whbanner{display:flex;align-items:center;gap:8px;padding:8px 13px;border-radius:8px;margin-bottom:16px;font-size:12px;font-weight:600}
.whbanner.all{background:#1D4ED810;border:1px solid #1D4ED840;color:#60A5FA}
.whbanner.own{background:#16A34A10;border:1px solid #16A34A40;color:#4ADE80}
.whbanner.tpl{background:#7C3AED10;border:1px solid #7C3AED40;color:#C084FC}
.syncbar{display:flex;align-items:center;gap:10px;padding:8px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:14px;font-size:11px;flex-wrap:wrap}
.syncbanner{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:8px;margin-bottom:14px;font-size:11px;font-weight:600;background:#052E1680;border:1px solid #16A34A40;color:#4ADE80}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-ov.show{opacity:1;pointer-events:all}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;width:370px;max-width:92vw;transform:scale(.95);transition:transform .2s;text-align:center}
.modal-ov.show .modal-box{transform:scale(1)}
.modal-icon{font-size:32px;margin-bottom:10px}
.modal-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:5px}
.modal-sub{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:14px}
.modal-info{background:var(--bg3);border-radius:7px;padding:10px;margin-bottom:14px;font-size:10px;font-family:'DM Mono',monospace;text-align:left;line-height:1.9}
.modal-acts{display:flex;gap:8px;justify-content:center}
.mcancel{padding:8px 18px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer}
.mconfirm{padding:8px 18px;background:var(--red);border:none;border-radius:7px;color:#fff;font-size:11px;font-weight:700;cursor:pointer}
.nameov{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center}
.namebox{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;width:340px;max-width:92vw;text-align:center}
.namebox h2{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:6px}
.namebox p{font-size:11px;color:var(--muted);margin-bottom:18px;line-height:1.6}
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:10px 15px;border-radius:8px;font-size:12px;font-weight:600;opacity:0;transform:translateY(20px);transition:all .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateY(0)}
.schgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(305px,1fr));gap:8px;margin-bottom:16px}
.schrow{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.schn{font-family:'DM Mono',monospace;font-size:10px;font-weight:600;width:138px;flex-shrink:0}
.schinput{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:4px 6px;color:var(--text);font-size:10px;font-family:'DM Mono',monospace;outline:none;width:74px}
.schinput:focus{border-color:var(--blue)}
.schlbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
/* Upload */
.upzone{border:2px dashed var(--border);border-radius:11px;padding:2.5rem 1rem;text-align:center;cursor:pointer;margin-bottom:14px;transition:border-color .2s}
.upzone:hover{border-color:var(--blue)}
.upsummary{display:flex;gap:18px;flex-wrap:wrap;background:var(--bg3);border-radius:7px;padding:10px 14px;margin-bottom:10px;font-size:12px}
.uperr{background:#450A0A;border:1px solid #EF444440;border-radius:8px;padding:11px 14px;margin-bottom:8px;font-size:11px;color:#FCA5A5;line-height:1.9}
.upwarn{background:#431407;border:1px solid #F9731640;border-radius:8px;padding:11px 14px;margin-bottom:8px;font-size:11px;color:#FCD34D;line-height:1.9}
.updone{background:#052E16;border:1px solid #16A34A60;border-radius:10px;padding:18px 22px;margin-bottom:14px}
.t2badge{background:#F9731620;color:#FCD34D;border:1px solid #F9731640;border-radius:3px;font-size:8px;padding:1px 4px;font-weight:700;margin-left:3px}
.t1badge{background:#3B82F620;color:#60A5FA;border:1px solid #3B82F640;border-radius:3px;font-size:8px;padding:1px 4px;font-weight:700;margin-left:3px}
/* AUTH */
.authov{position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(8px);z-index:400;display:flex;align-items:center;justify-content:center}
.authbox{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:32px 28px;width:380px;max-width:94vw;text-align:center}
.authbox h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:6px}
.authbox p{font-size:12px;color:var(--muted);margin-bottom:22px;line-height:1.6}
.auth-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:20px}
.auth-tab{flex:1;padding:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:var(--bg3);color:var(--muted);transition:all .2s}
.auth-tab.active{background:var(--blue);color:#fff}
.auth-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;margin-bottom:10px;transition:border-color .2s}
.auth-input:focus{border-color:var(--blue)}
.auth-btn{width:100%;padding:11px;background:var(--blue);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:10px;transition:all .2s}
.auth-btn:hover{background:var(--blue-dim)}
.google-btn{width:100%;padding:11px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.google-btn:hover{border-color:var(--blue)}
.auth-divider{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--muted);font-size:11px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-err{background:#450A0A;border:1px solid #EF444440;border-radius:7px;padding:9px 12px;font-size:11px;color:#FCA5A5;margin-bottom:10px;display:none}
.role-badge{padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700}
.role-admin{background:#F9731620;color:#FCD34D;border:1px solid #F9731640}
.role-manager{background:#3B82F620;color:#60A5FA;border:1px solid #3B82F640}
.role-viewer{background:#1E293B;color:var(--muted);border:1px solid var(--border)}
/* User management */
.umov{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.umov.show{opacity:1;pointer-events:all}
.umbox{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;width:520px;max-width:94vw;max-height:85vh;overflow-y:auto}
.umbox h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:16px}
.urow{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:8px;margin-bottom:8px;flex-wrap:wrap}
.uemail{font-family:'DM Mono',monospace;font-size:11px;flex:1;min-width:160px}
.urole-sel{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);font-size:11px;outline:none;cursor:pointer}
.uremove{background:transparent;border:1px solid #DC262640;color:#F87171;border-radius:5px;padding:3px 8px;font-size:10px;font-weight:700;cursor:pointer}
/* Lock overlay for no-access */
.lock-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.lock-msg{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px 28px;text-align:center;font-size:13px;color:var(--muted)}
</style>
</head>
<body>

<!-- AUTH OVERLAY — Simple PIN based, no Firebase Auth needed -->

function showAuthErr(msg) {

async function doLogin() {
  const name = document.getElementById('auth-name-inp').value.trim();
  const pin  = document.getElementById('auth-pin-inp').value.trim();
  if (!name || !pin) { showAuthErr('Naam aur PIN dono daalo'); return; }

  document.getElementById('auth-submit-btn').textContent = 'Checking…';
  document.getElementById('auth-submit-btn').disabled = true;

  try {
    // Check users in Firebase DB
    const snap = await db.ref('users').once('value');
    const users = snap.val() || {};

    // Also check default admin
    let matched = null;

    // Check Firebase users
    Object.values(users).forEach(u => {
      if (u.name && u.name.toLowerCase() === name.toLowerCase() && u.pin === pin) {
        matched = u;
      }
    });

    // Check default admin if no users set up yet
    if (!matched && name.toLowerCase() === DEFAULT_ADMIN.name.toLowerCase() && pin === DEFAULT_ADMIN.pin) {
      matched = DEFAULT_ADMIN;
      // Save admin to Firebase if first time
      const adminExists = Object.values(users).some(u => u.role === 'admin');
      if (!adminExists) {
        await db.ref('users/' + Date.now()).set(DEFAULT_ADMIN);
      }
    }

    if (!matched) {
      showAuthErr('Galat naam ya PIN — Admin se check karo');
      document.getElementById('auth-submit-btn').textContent = 'Login ➜';
      document.getElementById('auth-submit-btn').disabled = false;
      return;
    }

    // Login successful
    currentRole = matched.role;
    currentUser = matched.name;
    localStorage.setItem('quik_user', matched.name);
    localStorage.setItem('quik_role', matched.role);
    localStorage.setItem('quik_pin', pin);

    document.getElementById('authov').style.display = 'none';

    // Update header
    const roleLabels = { admin:'👑 Admin', manager:'📝 Manager', viewer:'👁️ Viewer' };
    document.getElementById('uname-hdr').textContent = '👤 ' + currentUser;
    document.getElementById('role-hdr').innerHTML = `<span class="role-badge role-${currentRole}" style="margin-left:6px">${roleLabels[currentRole]||currentRole}</span>`;
    if (canAdmin()) document.getElementById('um-btn').style.display = 'inline-block';

    startDBListeners();
    renderAll();
    showToast(`Welcome, ${currentUser}! 👋`);

  } catch(e) {
    showAuthErr('Error: ' + e.message);
    document.getElementById('auth-submit-btn').textContent = 'Login ➜';
    document.getElementById('auth-submit-btn').disabled = false;
  }
}

async function tryAutoLogin() {
  const savedName = localStorage.getItem('quik_user');
  const savedRole = localStorage.getItem('quik_role');
  const savedPin  = localStorage.getItem('quik_pin');

  if (savedName && savedRole && savedPin) {
    // Verify PIN still valid
    const snap = await db.ref('users').once('value');
    const users = snap.val() || {};
    let valid = false;

    Object.values(users).forEach(u => {
      if (u.name && u.name.toLowerCase() === savedName.toLowerCase() && u.pin === savedPin) valid = true;
    });
    if (savedName.toLowerCase() === DEFAULT_ADMIN.name.toLowerCase() && savedPin === DEFAULT_ADMIN.pin) valid = true;

    if (valid) {
      currentRole = savedRole;
      currentUser = savedName;
      document.getElementById('authov').style.display = 'none';
      const roleLabels = { admin:'👑 Admin', manager:'📝 Manager', viewer:'👁️ Viewer' };
      document.getElementById('uname-hdr').textContent = '👤 ' + currentUser;
      document.getElementById('role-hdr').innerHTML = `<span class="role-badge role-${currentRole}" style="margin-left:6px">${roleLabels[currentRole]||currentRole}</span>`;
      if (canAdmin()) document.getElementById('um-btn').style.display = 'inline-block';
      startDBListeners();
      renderAll();
      return;
    }
  }
  // Show login
  document.getElementById('authov').style.display = 'flex';
  if (savedName) document.getElementById('auth-name-inp').value = savedName;
}

// ── Date filter helpers ───────────────────────────────────────
function getToday()     { return new Date().toISOString().split('T')[0]; }
function getYesterday() { const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().split('T')[0]; }
function getWeekStart() { const d=new Date();d.setDate(d.getDate()-6);return d.toISOString().split('T')[0]; }
function getMonthStart(){ const d=new Date();d.setDate(1);return d.toISOString().split('T')[0]; }

function applyDateFilter(tripList) {
  const today = getToday();
  switch(dateFilterMode) {
    case 'today':     return tripList.filter(t => t.date === today);
    case 'yesterday': return tripList.filter(t => t.date === getYesterday());
    case 'week':      return tripList.filter(t => t.date >= getWeekStart() && t.date <= today);
    case 'month':     return tripList.filter(t => t.date >= getMonthStart() && t.date <= today);
    case 'all':       return tripList;
    case 'custom':
      const from = dateFilterFrom || '2000-01-01';
      const to   = dateFilterTo   || today;
      return tripList.filter(t => t.date >= from && t.date <= to);
    default: return tripList;
  }
}

// ── On-Time Dispatch calculator ───────────────────────────────
function calcOnTime(tripList) {
  // Uses whCheckin.departed vs trip.dispatch
  const results = tripList.map(t => {
    const scheduled = t.dispatch;
    const actual    = t.whCheckin?.departed;
    if (!scheduled || !actual) return { ...t, ontimeStatus: 'unknown', delayMins: null };
    const diff = toMins(actual) - toMins(scheduled);
    return {
      ...t,
      ontimeStatus: diff <= 0 ? 'ontime' : 'late',
      delayMins: diff,
    };
  });
  const withData   = results.filter(t => t.ontimeStatus !== 'unknown');
  const ontime     = withData.filter(t => t.ontimeStatus === 'ontime').length;
  const late       = withData.filter(t => t.ontimeStatus === 'late').length;
  const pct        = withData.length ? Math.round(ontime / withData.length * 100) : null;
  const delays     = withData.filter(t => t.delayMins > 0).map(t => t.delayMins);
  const avgDelay   = delays.length ? Math.round(delays.reduce((a,b)=>a+b,0)/delays.length) : 0;

  // Per driver
  const driverMap  = {};
  withData.forEach(t => {
    if (!driverMap[t.driver]) driverMap[t.driver] = { ontime:0, late:0, totalDelay:0 };
    driverMap[t.driver][t.ontimeStatus]++;
    if (t.delayMins > 0) driverMap[t.driver].totalDelay += t.delayMins;
  });

  return { results, ontime, late, pct, avgDelay, driverMap, total: withData.length };
}

//  DB LISTENERS — called after auth
// ═══════════════════════════════════════════════════════
function startDBListeners() {
  db.ref('trips').on('value', snap => {
    const data = snap.val();
    if (data) {
      trips = Object.entries(data).map(([id,v])=>({...v,_id:id}));
      trips.sort((a,b)=>new Date(b.date)-new Date(a.date));
    } else {
      if (canEdit()) SAMPLE.forEach(t => db.ref('trips').push(t));
    }
    setSyncStatus('live');
    renderAll();
  });

  db.ref('schedule').on('value', snap => {
    const d = snap.val();
    if (d) storeSchedule = {...storeSchedule, ...d};
  });

  db.ref('checkins').orderByChild('ts').limitToLast(100).on('value', snap => {
    const data = snap.val() || {};
    liveCheckins = Object.entries(data)
      .map(([id,v]) => ({...v, _id:id}))
      .sort((a,b) => (b.ts||0) - (a.ts||0));
    if(currentTab === 'live') renderMain();
  });

  db.ref('meta').on('value', snap => {
    const d = snap.val();
    if (d) setSyncStatus('live', `Last edit: ${d.lastUser||''} at ${d.lastTime||''}`);
  });

  db.ref('wh_checkins').orderByChild('ts').limitToLast(200).on('value', snap => {
    const data = snap.val() || {};
    whCheckins = Object.entries(data)
      .map(([id,v]) => ({...v, _id:id}))
      .sort((a,b) => (b.ts||0) - (a.ts||0));
    if (currentTab === 'wh-live') renderMain();
  });
}

  else if (s==='syncing') el.textContent = 'Syncing…';

//  KPI BUILDER
// ═══════════════════════════════════════════════════════
function buildKpis(data,cid){
  const n=data.length,u=data.reduce((a,t)=>a+(t.qty||0),0),p=data.reduce((a,t)=>a+(t.pallets||0),0),c=data.reduce((a,t)=>a+(t.cost||0),0);
  const util=n?(data.reduce((a,t)=>a+((t.pallets||0)/(t.capacity||14)),0)/n*100).toFixed(1):0;
  const dual=data.filter(t=>t.trip2).length;
  const cards=[
    {l:'Total Trips',v:n,s:`${data.filter(t=>t.status==='Completed').length} done · ${dual} 2nd-runs`,c:'blue'},
    {l:'Units Delivered',v:u.toLocaleString(),s:'FMCG units',c:'purple'},
    {l:'Pallets Loaded',v:p.toLocaleString(),s:'all vehicles',c:'orange'},
    {l:'Total Cost (AED)',v:'AED '+c.toLocaleString(),s:'incl. adhoc',c:'red'},
    {l:'Avg Utilization',v:util+'%',s:'vehicle capacity',c:'green'},
  ];
  document.getElementById(cid).innerHTML=cards.map(k=>
    `<div class="kpi-card ${k.c}"><div class="kpi-label">${k.l}</div><div class="kpi-value">${k.v}</div><div class="kpi-sub">${k.s}</div></div>`
  ).join('');
}

// ═══════════════════════════════════════════════════════
//  BREAKDOWN CARD BUILDER
// ═══════════════════════════════════════════════════════
function bcard(title,badge,data,color){
  const n=data.length,u=data.reduce((a,t)=>a+(t.qty||0),0),p=data.reduce((a,t)=>a+(t.pallets||0),0),c=data.reduce((a,t)=>a+(t.cost||0),0);
  const util=n?(data.reduce((a,t)=>a+((t.pallets||0)/(t.capacity||14)),0)/n*100).toFixed(1):0;
  const cpp=p?(c/p).toFixed(2):'0.00';
  const bl=badge==='own'?'OWN WH':badge==='tpl'?'3PL WH':'ADHOC';
  return `<div class="bcard">
    <div class="bc-hdr"><div class="bc-title">${title}</div><div class="bc-badge ${badge}">${bl}</div></div>
    <div class="brow"><span class="brow-l">Trips</span><span class="brow-v">${n}</span></div>
    <div class="brow"><span class="brow-l">Units</span><span class="brow-v">${u.toLocaleString()}</span></div>
    <div class="brow"><span class="brow-l">Pallets</span><span class="brow-v">${p}</span></div>
    <div class="brow"><span class="brow-l">Total Cost</span><span class="brow-v">AED ${c.toLocaleString()}</span></div>
    <div class="brow"><span class="brow-l">Cost/Pallet</span><span class="brow-v">AED ${cpp}</span></div>
    <div class="ubar">
      <div class="ubar-lbl"><span>Utilization</span><span>${util}%</span></div>
      <div class="ubar-track"><div class="ubar-fill" style="width:${util}%;background:${color}"></div></div>
    </div>
  </div>`;
}

let spHighlight={1:-1,2:-1};
function spRender(n){
  const q=(document.getElementById('spinp-'+n)||{}).value||'';
  const vis=STORE_NAMES.filter(s=>s.toLowerCase().includes(q.toLowerCase()));
  const dd=document.getElementById('spdrop-'+n);

function spOpen(n){const dd=document.getElementById('spdrop-'+n);if(dd){spRender(n);dd.classList.add('open');}}
function spClose(n){const dd=document.getElementById('spdrop-'+n);if(dd)dd.classList.remove('open');}
function spToggle(n,store){
  const idx=selectedStores[n].indexOf(store);
  if(idx>=0)selectedStores[n].splice(idx,1);else selectedStores[n].push(store);
  spRender(n);renderTags(n);renderDispInfo(n);renderStoreTimeInputs(n);
}
function renderTags(n){
  const el=document.getElementById('sptags-'+n),cnt=document.getElementById('spcnt-'+n);
  if(!el)return;
  cnt&&(cnt.textContent=selectedStores[n].length);
  el.innerHTML=selectedStores[n].map(s=>`<span class="sptag">${s}<span class="rx" onclick="spToggle(${n},'${s}')">×</span></span>`).join('');
}
function renderDispInfo(n){
  const box=document.getElementById('dinfo-'+n),rows=document.getElementById('drows-'+n);
  if(!box)return;
  if(!selectedStores[n].length){box.classList.remove('show');return;}
  box.classList.add('show');
  rows.innerHTML=selectedStores[n].map(s=>{
    const sch=storeSchedule[s]||{};
    return `<div class="drow"><div class="dsn">${s}</div><div class="dtime">🕐 ${sch.dispatch||'—'}</div><div class="dwin">Window: ${sch.ws||'—'} – ${sch.we||'—'}</div></div>`;
  }).join('');
}
function renderStoreTimeInputs(n){
  const wrap=document.getElementById('sttimes-wrap-'+n),con=document.getElementById('sttimes-'+n);
  if(!wrap)return;
  if(!selectedStores[n].length){wrap.style.display='none';return;}
  wrap.style.display='block';
  con.innerHTML=selectedStores[n].map(s=>`
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:9px 11px">
      <div style="font-size:9px;font-weight:700;color:var(--orange);margin-bottom:6px;font-family:'DM Mono',monospace">${s} <span style="color:var(--muted);font-weight:400">Sched: ${storeSchedule[s]?.dispatch||'—'}</span></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <div><label class="flabel">Arrival</label><input class="schinput" type="time" id="sta-${n}-${s}" style="width:88px"></div>
        <div><label class="flabel">Depart</label><input class="schinput" type="time" id="std-${n}-${s}" style="width:88px"></div>
      </div>
    </div>`).join('');
}
function spKey(e,n){
  const vis=STORE_NAMES.filter(s=>s.toLowerCase().includes((document.getElementById('spinp-'+n)||{}).value||''));
  if(e.key==='ArrowDown'){e.preventDefault();spHighlight[n]=Math.min(spHighlight[n]+1,vis.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();spHighlight[n]=Math.max(spHighlight[n]-1,0);}
  else if(e.key==='Enter'&&spHighlight[n]>=0){e.preventDefault();spToggle(n,vis[spHighlight[n]]);}
  else if(e.key==='Escape'){spClose(n);return;}
  document.querySelectorAll(`#spdrop-${n} .spopt`).forEach((el,i)=>el.classList.toggle('hi',i===spHighlight[n]));
}
document.addEventListener('click',e=>{
  [1,2].forEach(n=>{const w=document.getElementById('spwrap-'+n);if(w&&!w.contains(e.target))spClose(n);});
});
function spHTML(n){
  return `<div class="spwrap" id="spwrap-${n}">
    <label class="flabel">Store Names <span class="scnt" id="spcnt-${n}">0</span></label>
    <input class="spinput" id="spinp-${n}" placeholder="Search & select stores…" autocomplete="off"
      oninput="spRender(${n})" onfocus="spOpen(${n})" onkeydown="spKey(event,${n})">
    <div class="spdrop" id="spdrop-${n}"></div>
    <div class="sptags" id="sptags-${n}"></div>
    <div class="dinfo" id="dinfo-${n}">

    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:8px" id="sttimes-${n}"></div>

}

function startEdit(td,tripId,store,field){
  const t=trips.find(x=>x._id===tripId)||{};
  let curVal='';
  if(field==='dispatch')curVal=t.dispatch||'';
  else{const st=(t.storeTimes&&t.storeTimes[store])||{};curVal=st[field]||'';}
  td.innerHTML=`<input class="einput" type="time" value="${curVal}"
    onblur="commitEdit('${tripId}','${store}','${field}',this.value)"
    onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape'){event.target.value='${curVal}';this.blur();}"
    autofocus>`;
  td.querySelector('input').focus();
}
function commitEdit(tripId,store,field,val){
  if(!canEdit()){showToast('Access nahi hai','#EF4444');renderMain();return;}
  if(field==='dispatch'){
    db.ref('trips/'+tripId+'/dispatch').set(val);
  } else {
    db.ref('trips/'+tripId+'/storeTimes/'+store+'/'+field).set(val);
  }
  recordMeta();showToast('✏️ Saved','#3B82F6');
}

function toggleDualTrip(){

  const el=document.getElementById('togswitch');
  if(el)el.classList.toggle('on',dualTrip);
  const sec=document.getElementById('trip2-sec');
  if(sec)sec.style.display=dualTrip?'block':'none';

    const d=document.getElementById('f-date'),d2=document.getElementById('f2-date');

function syncDriver(){
  const d=document.getElementById('f-driver'),d2=document.getElementById('f2-driver');
  if(d&&d2)d2.value=d.value;
}
function getStoreTimes(n){
  const obj={};
  selectedStores[n].forEach(s=>{
    const a=document.getElementById('sta-'+n+'-'+s),dp=document.getElementById('std-'+n+'-'+s);
    obj[s]={arr:a?a.value:'',dep:dp?dp.value:''};
  });
  return obj;
}
function gv(id){const el=document.getElementById(id);return el?el.value:'';}
function buildTripObj(prefix,n,t2){
  const sn=selectedStores[n];
  // Try both prefix formats for compatibility
  const getVal = (field) => {
    return gv(prefix+field) || gv('f-'+field) || '';
  };
  const whVal  = gv(prefix+'wh');
  const vtVal  = gv(prefix+'vt');
  return {
    date:gv(prefix+'date')||new Date().toISOString().split('T')[0],
    wh:whVal, vt:vtVal,
    vid:gv(prefix+'vid')||'—',
    driver:t2?gv('f-driver'):gv(prefix+'driver'),
    trip2:t2, storeNames:sn, storeTimes:getStoreTimes(n),
    qty:+gv(prefix+'qty')||0, pallets:+gv(prefix+'pallets')||0,
    capacity:+gv(prefix+'capacity')||14, cost:+gv(prefix+'cost')||0,
    dispatch:gv(prefix+'dispatch'), status:gv(prefix+'status')||'Completed',
    remarks:gv(prefix+'remarks'),
  };
}
function addTrip(){
  if(!canEdit()){showToast('Access nahi hai','#EF4444');return;}
  const t1=buildTripObj('f-',1,false);
  // Debug: log what we got
  console.log('wh:', t1.wh, 'vt:', t1.vt);
  // More lenient check — accept if either field has value
  const whEl = document.getElementById('f-wh');
  const vtEl = document.getElementById('f-vt');
  const whVal = whEl ? whEl.value : t1.wh;
  const vtVal = vtEl ? vtEl.value : t1.vt;
  if(!whVal||!vtVal){showToast('Warehouse & Vehicle Type select karo','#EF4444');return;}
  t1.wh = whVal; t1.vt = vtVal;
  db.ref('trips').push(t1);
  if(dualTrip){
    const t2=buildTripObj('f2-',2,true);
    const wh2El=document.getElementById('f2-wh'),vt2El=document.getElementById('f2-vt');
    if(wh2El&&vt2El&&wh2El.value&&vt2El.value){
      t2.wh=wh2El.value;t2.vt=vt2El.value;t2.driver=t1.driver;
      db.ref('trips').push(t2);showToast(`✓ 2 trips added for ${t1.driver}`);
    } else showToast('Trip 1 added — Trip 2 skipped','#F97316');
  } else showToast('✓ Trip added!');
  recordMeta();resetForm();
}
function resetForm(){
  ['f-date','f-wh','f-vt','f-vid','f-driver','f-qty','f-pallets','f-capacity','f-cost','f-dispatch','f-status','f-remarks',
   'f2-date','f2-wh','f2-vt','f2-vid','f2-qty','f2-pallets','f2-capacity','f2-cost','f2-dispatch','f2-status','f2-remarks']

const TRIP_REQ=['date','warehouse','vehicle_type','driver','qty','pallets','cost_aed','status'];
const STORE_REQ=['store_name','dispatch_time','window_start','window_end'];
const DATE_RE=/^\d{4}-\d{2}-\d{2}$/,TIME_RE=/^\d{1,2}:\d{2}$/;
const VALID_WH=['own warehouse','3pl warehouse'],VALID_VT=['own fleet','3pl fleet','adhoc/rental'];
const VALID_ST=['completed','in transit','delayed','partial'];

// Map of friendly column header variations → internal key
// Handles headers like "Date\n(YYYY-MM-DD)", "Warehouse Type\n(Own/3PL)", etc.
const HEADER_MAP = {
  date:['date'],
  warehouse:['warehouse','warehouse type','warehouse_type'],
  vehicle_type:['vehicle type','vehicle_type','veh type'],
  vehicle_id:['vehicle id','vehicle_id','plate','vehicle id / plate'],
  driver:['driver','driver name','driver_name'],
  trip_number:['trip number','trip_number','trip','trip no'],
  qty:['qty','qty (units)','units','quantity'],
  pallets:['pallets','pallets loaded','pallets_loaded'],
  capacity:['capacity','vehicle capacity','vehicle_capacity'],
  cost_aed:['cost','cost_aed','cost (aed)','trip cost (aed)','trip cost','cost aed'],
  dispatch_time:['dispatch time','dispatch_time','dispatch time from wh (hh:mm)','dispatch'],
  status:['status','delivery status','delivery_status'],
  store_names:['store names','store_names','stores','store names (comma separated)'],
  remarks:['remarks','notes'],
  // Store Times sheet
  store_name:['store name','store_name'],
  window_start:['window start','window_start','ws'],
  window_end:['window end','window_end','we'],
};

function cleanHeader(h){
  // Remove newlines, brackets, asterisks, extra whitespace
  return String(h).replace(/\n/g,' ').replace(/\s*\(.*?\)\s*/g,' ').replace(/\*/g,'').replace(/\s+/g,' ').trim().toLowerCase();
}

function mapHeader(raw){
  const clean = cleanHeader(raw);
  for(const [key, variants] of Object.entries(HEADER_MAP)){
    if(variants.some(v => clean.includes(v) || v.includes(clean))) return key;
  }
  // fallback: basic normalize
  return clean.replace(/[\s\-/]+/g,'_');
}

function cleanCellValue(val){
  if(val===null||val===undefined) return '';
  // Excel date object (JS Date)
  if(val instanceof Date){
    const y=val.getFullYear(),m=String(val.getMonth()+1).padStart(2,'0'),d=String(val.getDate()).padStart(2,'0');
    return `${y}-${m}-${d}`;
  }
  const s = String(val).trim();
  // Excel time string like "5:25 AM" or "08:10 AM" → HH:MM 24h
  const ampm = s.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
  if(ampm){
    let h=parseInt(ampm[1]),min=ampm[2],period=ampm[3].toUpperCase();
    if(period==='AM'&&h===12)h=0;
    if(period==='PM'&&h!==12)h+=12;
    return String(h).padStart(2,'0')+':'+min;
  }
  // Already HH:MM format
  if(TIME_RE.test(s)){
    const parts=s.split(':');
    return String(parseInt(parts[0])).padStart(2,'0')+':'+parts[1];
  }
  return s;
}

function normRow(row){
  const out={};
  Object.keys(row).forEach(k=>{
    const mappedKey = mapHeader(k);
    out[mappedKey] = cleanCellValue(row[k]);
  });
  return out;
}

function processUploadFile(file){
  const isCSV=file.name.toLowerCase().endsWith('.csv');
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      let rows;
      if(isCSV){
        const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim());
        if(lines.length<2){setUploadState('error','File is empty.');return;}
        const hdrs=lines[0].split(',').map(h=>h.trim());
        rows=lines.slice(1).map(line=>{
          const vals=line.split(',').map(v=>v.trim()),obj={};
          hdrs.forEach((h,i)=>{obj[h]=vals[i]||'';});return obj;
        });
      } else {
        const wb=XLSX.read(e.target.result,{type:'array',raw:false,cellDates:true});
        // Find right sheet
        const sn=wb.SheetNames.find(n=>uploadTab==='trips'?n.toLowerCase().includes('trip'):n.toLowerCase().includes('store'))||wb.SheetNames[0];
        const ws=wb.Sheets[sn];
        // Skip title/subtitle rows — find the actual header row (contains 'date' or 'store')
        const allRows=XLSX.utils.sheet_to_json(ws,{defval:'',raw:false,header:1});
        let headerRowIdx=0;
        for(let i=0;i<Math.min(5,allRows.length);i++){
          const rowStr=allRows[i].join('').toLowerCase();
          if(rowStr.includes('date')||rowStr.includes('store_name')||rowStr.includes('store name')){
            headerRowIdx=i; break;
          }
        }
        const headers=allRows[headerRowIdx];
        rows=[];
        for(let i=headerRowIdx+1;i<allRows.length;i++){
          const r=allRows[i];
          if(!r||!r.some(v=>v!==''&&v!==null&&v!==undefined)) continue;
          const obj={};
          headers.forEach((h,j)=>{if(h)obj[h]=r[j]??'';});
          rows.push(obj);
        }
      }
      rows=rows.map(normRow);
      // Remove totally empty rows
      rows=rows.filter(r=>Object.values(r).some(v=>v!==''));
      if(!rows.length){setUploadState('error','No data rows found. Make sure you are using the Trips sheet.');return;}
      const req=uploadTab==='trips'?TRIP_REQ:STORE_REQ;
      const cols=Object.keys(rows[0]);
      const miss=req.filter(r=>!cols.includes(r));
      if(miss.length){setUploadState('error','Missing required columns: '+miss.join(', ')+'. Please use the provided template.');return;}
      const errs=[],warns=[];
      rows.forEach((row,i)=>{
        const rn=i+2;
        if(uploadTab==='trips'){
          if(!DATE_RE.test(row.date)) errs.push({row:rn,col:'date',val:row.date,msg:'Must be YYYY-MM-DD (got: '+row.date+')'});
          if(!row.driver) errs.push({row:rn,col:'driver',val:'',msg:'Cannot be empty'});
          if(isNaN(+row.qty)||+row.qty<0) errs.push({row:rn,col:'qty',val:row.qty,msg:'Must be number ≥ 0'});
          if(isNaN(+row.cost_aed)||+row.cost_aed<0) errs.push({row:rn,col:'cost_aed',val:row.cost_aed,msg:'Must be number ≥ 0'});
          if(row.warehouse&&!VALID_WH.includes(row.warehouse.toLowerCase())) warns.push({row:rn,col:'warehouse',val:row.warehouse,msg:'Expected Own Warehouse or 3PL Warehouse'});
          if(row.vehicle_type&&!VALID_VT.includes(row.vehicle_type.toLowerCase())) warns.push({row:rn,col:'vehicle_type',val:row.vehicle_type,msg:'Expected Own Fleet/3PL Fleet/Adhoc/Rental'});
          if(row.status&&!VALID_ST.includes(row.status.toLowerCase())) warns.push({row:rn,col:'status',val:row.status,msg:'Expected Completed/In Transit/Delayed/Partial'});
        } else {
          if(!row.store_name) errs.push({row:rn,col:'store_name',val:'',msg:'Cannot be empty'});
          ['dispatch_time','window_start','window_end'].forEach(f=>{
            if(row[f]&&!TIME_RE.test(row[f])) errs.push({row:rn,col:f,val:row[f],msg:'Must be HH:MM'});
          });
        }
      });
      uploadRows=rows;uploadErrs=errs;uploadWarns=warns;
      setUploadState('preview');
    }catch(err){setUploadState('error','File read failed: '+err.message);}
  };
  if(isCSV)reader.readAsText(file);else reader.readAsArrayBuffer(file);
}
function setUploadState(s,msg){
  uploadStatus=s;
  if(msg)document.getElementById('up-errbox')&&(document.getElementById('up-errbox').textContent=msg);
  renderUploadPanel();
}
function doConfirmUpload(){
  if(!canEdit()){showToast('Access nahi hai','#EF4444');return;}
  if(!uploadRows)return;
  uploadStatus='pushing';renderUploadPanel();
  try{
    if(uploadTab==='trips'){
      uploadRows.forEach(row=>{
        const sn=row.store_names?row.store_names.split(',').map(s=>s.trim()).filter(Boolean):[];
        db.ref('trips').push({
          date:row.date||'',wh:row.warehouse||'',vt:row.vehicle_type||'',
          vid:row.vehicle_id||'—',driver:row.driver||'—',trip2:row.trip_number==='2',
          storeNames:sn,storeTimes:{},qty:+row.qty||0,pallets:+row.pallets||0,
          capacity:+row.capacity||14,cost:+row.cost_aed||0,dispatch:row.dispatch_time||'',
          status:row.status||'Completed',remarks:row.remarks||'',
        });
      });
      uploadStatus='done';
      document.getElementById('up-donemsg').textContent=`✅ ${uploadRows.length} trips imported to Firebase!`;
    } else {
      const updates={};
      uploadRows.forEach(row=>{
        if(row.store_name) updates['schedule/'+row.store_name]={dispatch:row.dispatch_time||'',ws:row.window_start||'',we:row.window_end||''};
      });
      db.ref().update(updates);
      uploadStatus='done';
      document.getElementById('up-donemsg')&&(document.getElementById('up-donemsg').textContent=`✅ ${uploadRows.length} store schedules updated!`);
    }
    recordMeta();renderUploadPanel();showToast(`✅ Import successful!`);
  }catch(e){uploadStatus='error';document.getElementById('up-errbox')&&(document.getElementById('up-errbox').textContent='Firebase error: '+e.message);renderUploadPanel();}
}
function resetUpload(){uploadRows=null;uploadErrs=[];uploadWarns=[];uploadStatus='idle';renderUploadPanel();}
function setUploadTab(t){uploadTab=t;resetUpload();}

function renderUploadPanel(){
  const container=document.getElementById('upload-inner');
  if(!container)return;
  const previewCols=uploadTab==='trips'?['date','warehouse','vehicle_type','driver','trip_number','qty','pallets','cost_aed','dispatch_time','status','store_names']:['store_name','dispatch_time','window_start','window_end'];
  const errRows=new Set((uploadErrs||[]).map(e=>e.row)),warnRows=new Set((uploadWarns||[]).map(w=>w.row));
  let h='';
  if(uploadStatus==='idle'||uploadStatus==='error'){
    h+=`<div class="upzone" id="upzone" ondragover="event.preventDefault()" ondrop="event.preventDefault();processUploadFile(event.dataTransfer.files[0])" onclick="document.getElementById('ufile').click()">
      <div style="font-size:28px;margin-bottom:8px">📂</div>
      <div style="font-size:14px;font-weight:600;margin-bottom:4px">Drop file here ya click karke browse karo</div>

      <input id="ufile" type="file" accept=".xlsx,.xls,.csv" style="display:none" onchange="processUploadFile(this.files[0])">
    </div>`;
    if(uploadStatus==='error') h+=`<div class="uperr" id="up-errbox">Upload failed</div>`;
  }
  if(uploadStatus==='preview'&&uploadRows){
    h+=`<div class="upsummary">
      <span><strong style="color:var(--text)">${uploadRows.length}</strong> <span style="color:var(--muted)">rows</span></span>
      <span><strong style="color:${uploadErrs.length?'#F87171':'#4ADE80'}">${uploadErrs.length}</strong> <span style="color:var(--muted)">errors</span></span>
      <span><strong style="color:${uploadWarns.length?'#FCD34D':'#4ADE80'}">${uploadWarns.length}</strong> <span style="color:var(--muted)">warnings</span></span>
      <span><strong style="color:#4ADE80">${uploadRows.length-errRows.size}</strong> <span style="color:var(--muted)">rows ready</span></span>
    </div>`;
    if(uploadErrs.length) h+=`<div class="uperr"><strong>${uploadErrs.length} Error(s) — fix karo pehle:</strong><ul style="margin:7px 0 0 16px">${uploadErrs.map(e=>`<li>Row ${e.row} · ${e.col} = "${e.val}" — ${e.msg}</li>`).join('')}</ul></div>`;
    if(uploadWarns.length) h+=`<div class="upwarn"><strong>${uploadWarns.length} Warning(s) — check karo:</strong><ul style="margin:7px 0 0 16px">${uploadWarns.map(w=>`<li>Row ${w.row} · ${w.col} = "${w.val}" — ${w.msg}</li>`).join('')}</ul></div>`;
    h+=`<div style="font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:600">Preview — first ${Math.min(uploadRows.length,8)} rows</div>
    <div style="overflow-x:auto;border:1px solid var(--border);border-radius:7px;margin-bottom:14px">
      <table style="font-size:10px;font-family:'DM Mono',monospace">
        <thead><tr>${previewCols.map(c=>`<th style="padding:6px 9px;background:var(--bg3);border-bottom:1px solid var(--border);color:var(--muted);font-size:9px;text-align:left;white-space:nowrap">${c}</th>`).join('')}</tr></thead>
        <tbody>${uploadRows.slice(0,8).map((row,i)=>{
          const rn=i+2,rbg=errRows.has(rn)?'#450A0A':warnRows.has(rn)?'#431407':'transparent';
          return `<tr style="background:${rbg};border-bottom:1px solid var(--border)">${previewCols.map(c=>`<td style="padding:5px 9px;white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis">${row[c]||''}</td>`).join('')}</tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;
    h+=`<div style="display:flex;gap:9px;flex-wrap:wrap">
      ${!uploadErrs.length?`<button onclick="doConfirmUpload()" class="btn-p" style="background:#16A34A">✅ Confirm & Import ${uploadRows.length} rows to Firebase</button>`:''}
      <button onclick="resetUpload()" class="btn-s">${uploadErrs.length?'Upload Fixed File':'Cancel'}</button>
    </div>`;
  }
  if(uploadStatus==='pushing') h=`<div style="text-align:center;padding:2rem;color:var(--muted);font-size:13px"><div style="font-size:28px;margin-bottom:10px">⏳</div>Firebase mein save ho raha hai…</div>`;
  if(uploadStatus==='done') h=`<div class="updone">
    <div style="font-size:24px;margin-bottom:8px">🎉</div>
    <div style="font-size:14px;font-weight:700;color:#4ADE80;margin-bottom:6px">Import successful!</div>
    <div id="up-donemsg" style="font-size:12px;color:#86EFAC;line-height:1.7"></div>
    <div style="font-size:11px;color:var(--muted);margin-top:8px">Dashboard automatically update ho gaya.</div>
  </div>
  <div style="display:flex;gap:9px">
    <button onclick="resetUpload()" class="btn-p">Upload Another File</button>
    <button onclick="switchTab('trips')" class="btn-s">View Trip Log →</button>
  </div>`;
  container.innerHTML=h;
  if(uploadStatus==='done'){
    const dm=document.getElementById('up-donemsg');
    if(dm&&uploadRows) dm.textContent=`✅ ${uploadRows.length} ${uploadTab==='trips'?'trips':'store schedules'} imported to Firebase!`;
  }
}

            return `<tr style="${isToday?'background:#16A34A08':''}">
              <td><span style="font-family:'DM Mono',monospace;color:${color};font-weight:600">${c.time||'—'}</span></td>
              <td style="color:${isToday?'var(--green)':'var(--muted)'}">${isToday?'Today':c.date}</td>
              <td>${c.driver||'—'}</td>
              <td style="font-family:'DM Mono',monospace;font-weight:600">${(c.store||'').replace('QUIK_','')}</td>
              <td><span style="background:${color}20;color:${color};border:1px solid ${color}40;border-radius:20px;font-size:9px;font-weight:700;padding:2px 8px">${icon} ${label}</span></td>
              <td style="font-size:9px;color:var(--muted);font-family:'DM Mono',monospace">${(c.tripId||'').slice(0,8)}…</td>
            </tr>`;
          }).join('') : `<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--muted)">Koi check-in nahi hua abhi tak</td></tr>`}
          </tbody>
        </table></div>
      </div>
    </div>`;
  }
  else if(currentTab==='wh-live'){ renderWHActivity(); }
  else if(currentTab==='store-times'){
    m.innerHTML=`<div class="fsec">
      <div class="section-title">Store Dispatch Schedule — Edit Times <div style="flex:1;height:1px;background:var(--border)"></div></div>
      <p style="font-size:11px;color:var(--muted);margin-bottom:14px;line-height:1.7">Sab users ke liye times update honge Firebase ke through — team ko instantly naye times dikhengy.</p>
      <div class="schgrid" id="sch-grid"></div>
      <div style="display:flex;justify-content:flex-end">
        <button onclick="saveScheduleAll()" class="btn-p">💾 Save All Times (All Users)</button>
      </div>
    </div>`;
    document.getElementById('sch-grid').innerHTML=STORE_NAMES.map(s=>{
      const sch=storeSchedule[s]||{};
      return `<div class="schrow">
        <div class="schn">${s}</div>
        <span class="schlbl">Dispatch</span><input class="schinput" type="time" id="sd-${s}" value="${sch.dispatch||''}">
        <span style="font-size:9px;color:var(--muted)">|</span>
        <span class="schlbl">Window</span><input class="schinput" type="time" id="sw-${s}" value="${sch.ws||''}">
        <span style="font-size:9px;color:var(--muted)">–</span>
        <input class="schinput" type="time" id="se-${s}" value="${sch.we||''}">
      </div>`;
    }).join('');
  }
}

// ── PRINT TRIP QR ────────────────────────────────────────────
function printTripQR(tripId, driver, vid) {
  const url = `https://asimshah1000-ctrl.github.io/quik-checkin/warehouse.html?mode=trip&trip=${tripId}`;
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><title>Trip QR — ${driver}</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0B1120;color:#F1F5F9;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
    .card{background:#111827;border:2px solid #1E2D45;border-radius:16px;padding:28px;text-align:center;max-width:320px;width:90%}
    h2{font-size:22px;font-weight:800;margin-bottom:6px}
    .sub{font-size:12px;color:#64748B;margin-bottom:18px}
    .info{background:#1E293B;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;line-height:2}
    .steps{text-align:left;font-size:12px;line-height:2.2;color:#94A3B8;margin-bottom:16px}
    .url{font-size:9px;color:#64748B;word-break:break-all;margin-top:10px}
    @media print{body{background:#fff;color:#000}.card{border-color:#ccc;background:#fff}.info{background:#f5f5f5}.sub,.url{color:#666}.steps{color:#444}}
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></sc` + `ript>
  </head><body>
  <div class="card">
    <h2>📦 Loading QR</h2>
    <div class="sub">Saman load karne ke baad scan karo</div>
    <div class="info">
      👤 <strong>${driver||'—'}</strong><br>
      🚛 <strong>${vid||'—'}</strong><br>
      🗓️ <strong>${new Date().toLocaleDateString('en-GB')}</strong>
    </div>
    <div id="qrcode" style="display:flex;justify-content:center;margin-bottom:14px"></div>
    <div class="steps">
      1. 🏭 Warehouse entrance pe Arrived scan karo<br>
      2. 📦 Saman load karo<br>
      3. Ye QR scan karo — Loaded mark karo<br>
      4. 🚛 Wapas entrance pe Departed scan karo
    </div>
    <div class="url">${url}</div>
  </div>
  <script>
    new QRCode(document.getElementById('qrcode'), {
      text: '${url}', width:200, height:200,
      colorDark:'#1E3A5F', colorLight:'#FFFFFF'
    });
    setTimeout(() => window.print(), 800);
  </sc` + `ript>
  </body></html>`);
  win.document.close();
}

// ── WH ACTIVITY TAB ──────────────────────────────────────────
function renderWHActivity() {
  const today = new Date().toISOString().split('T')[0];
  const todayWH = whCheckins.filter(c => c.date === today);
  const actionColor = { arrived:'#3B82F6', loaded:'#A855F7', departed:'#F97316' };
  const actionIcon  = { arrived:'🏭', loaded:'📦', departed:'🚛' };
  const actionLabel = { arrived:'Arrived at WH', loaded:'Vehicle Loaded', departed:'Departed WH' };

  // Build driver summary for today
  const driverMap = {};
  todayWH.forEach(c => {
    const key = c.tripId || c.driver;
    if (!driverMap[key]) driverMap[key] = { driver:c.driver||'—', arrived:null, loaded:null, departed:null, tripId:c.tripId };
    driverMap[key][c.action] = c.time;
  });

  const m = document.getElementById('main');
  m.innerHTML = `<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700">🏭 Warehouse Activity</div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px">Driver warehouse arrivals, loading, aur departures</div>
      </div>
      <div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--green);background:#16A34A15;border:1px solid #16A34A40;padding:5px 12px;border-radius:6px">🔴 LIVE</div>
    </div>

    <!-- KPIs -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px">
      ${[
        ['WH Arrivals', todayWH.filter(c=>c.action==='arrived').length, '#3B82F6'],
        ['Vehicles Loaded', todayWH.filter(c=>c.action==='loaded').length, '#A855F7'],
        ['Departed', todayWH.filter(c=>c.action==='departed').length, '#F97316'],
        ['Pending Depart', Object.values(driverMap).filter(d=>d.arrived&&!d.departed).length, '#EF4444'],
      ].map(([l,v,color])=>`
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center">
          <div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px">${l}</div>
          <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:${color}">${v}</div>
        </div>`).join('')}
    </div>

    <!-- Driver status grid -->
    ${Object.keys(driverMap).length > 0 ? `
    <div class="section-title">Today's Driver Status <div style="flex:1;height:1px;background:var(--border)"></div></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:20px">
      ${Object.values(driverMap).map(d => {
        const done = d.departed, loaded = d.loaded, arrived = d.arrived;
        const color = done?'#22C55E':loaded?'#A855F7':arrived?'#3B82F6':'#64748B';
        const label = done?'✅ Departed':loaded?'📦 Loaded':arrived?'🏭 At WH':'⏳ Not arrived';
        return `<div style="background:var(--bg2);border:1px solid ${color}40;border-radius:10px;padding:12px;border-left:3px solid ${color}">
          <div style="font-size:12px;font-weight:700;margin-bottom:5px">👤 ${d.driver}</div>
          <div style="font-size:11px;font-weight:600;color:${color};margin-bottom:4px">${label}</div>
          <div style="font-size:9px;color:var(--muted)">
            ${arrived?`🏭 ${arrived}`:''}${arrived&&loaded?' · ':''}${loaded?`📦 ${loaded}`:''}${loaded&&done?' · ':''}${done?`🚛 ${done}`:''}
          </div>
        </div>`;
      }).join('')}
    </div>` : `
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:24px;text-align:center;margin-bottom:20px;color:var(--muted);font-size:13px">
      📭 Aaj koi warehouse activity nahi hua abhi tak.
    </div>`}

    <!-- Full log -->
    <div class="section-title">Full Activity Log <div style="flex:1;height:1px;background:var(--border)"></div></div>
    <div class="twrap">
      <div style="overflow-x:auto"><table>
        <thead><tr>${['Time','Date','Driver','Action','Trip ID'].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
        <tbody>
        ${whCheckins.length ? whCheckins.slice(0,50).map(c => {
          const color = actionColor[c.action]||'#64748B';
          const isToday = c.date===today;
          return `<tr style="${isToday?'background:#3B82F608':''}">
            <td style="font-family:'DM Mono',monospace;color:${color};font-weight:600">${c.time||'—'}</td>
            <td style="color:${isToday?'var(--green)':'var(--muted)'}">${isToday?'Today':c.date}</td>
            <td>${c.driver||'—'}</td>
            <td><span style="background:${color}20;color:${color};border:1px solid ${color}40;border-radius:20px;font-size:9px;font-weight:700;padding:2px 8px">${actionIcon[c.action]||''} ${actionLabel[c.action]||c.action}</span></td>
            <td style="font-size:9px;color:var(--muted);font-family:'DM Mono',monospace">${(c.tripId||'').slice(0,8)}…</td>
          </tr>`;
        }).join('') : `<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--muted)">Koi activity nahi</td></tr>`}
        </tbody>
      </table></div>
    </div>
  </div>`;
}

function saveScheduleAll(){
  if(!canAdmin()){showToast('Sirf Admin ye change kar sakta hai','#EF4444');return;}
  const updates={};
  STORE_NAMES.forEach(s=>{
    const d=document.getElementById('sd-'+s),ws=document.getElementById('sw-'+s),we=document.getElementById('se-'+s);
    if(d&&ws&&we){
      storeSchedule[s]={dispatch:d.value,ws:ws.value,we:we.value};
      updates['schedule/'+s]={dispatch:d.value,ws:ws.value,we:we.value};
    }
  });
  db.ref().update(updates);
  recordMeta();showToast('✅ Store schedules saved for all users!');
}
